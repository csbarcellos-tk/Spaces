<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-black text-white">
    <div class="header-shell flex flex-col items-center justify-center">
        <h1 class="text-3xl font-bold text-center mt-10">Planets views</h1>
        <div class="flex items-center justify-center gap-4 mt-10">
            <button type="button" class="btn" onclick="window.open('https://github.com/csbarcellos-tk')">
                <strong>Github</strong>
                <div id="container-stars">
                    <div id="stars"></div>
                </div>
            </button>
        </div>
    </div>
    <div class="justify-center items-center flex flex-col gap-2 mt-20">
        <div class="Marte">
            <img src="img/Marte.gif" alt="Mercury">

        </div>
        <div class="Saturno">
            <img src="img/Saturno.gif" alt="Earth">
        </div>
        <div class="Venus">
            <img src="img/venus.gif" alt="Mars">
        </div>
    </div>
</body>
</html>
